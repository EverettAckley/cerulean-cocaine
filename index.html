<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerulean Warbler</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* --- Native-Style Mobile Styles --- */
        :root {
            --bg-color: #fff;
            --text-color: #000;
            --controls-bg: #555;
            --controls-color: #fff;
            --active-track-bg: #e0e0e0;
            --timeline-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: var(--text-color);
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center; 
            padding: 0 15px;
            background: var(--bg-color);
            border-bottom: 1px solid #ccc;
        }

        #title {
            font-size: 18px;
            font-weight: 500;
        }

        #playlist-container {
            flex-grow: 1;
            overflow-y: scroll;
            padding-bottom: 10px;
        }

        .track-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: 0.2s;
        }

        .track-item.active {
            background-color: var(--active-track-bg);
        }

        .track-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 3px;
        }

        .track-metadata {
            font-size: 14px;
            color: #777;
            line-height: 1.4;
        }

        #timeline-container {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #ccc;
        }

        #current-time, #total-time {
            font-size: 12px;
            color: #555;
            width: 35px;
            text-align: center;
        }

        #progress-bar {
            flex-grow: 1;
            cursor: pointer;
            -webkit-appearance: none;
            height: 4px;
            background: #d3d3d3;
            border-radius: 2px;
            outline: none;
        }

        #progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 50%;
            cursor: pointer;
            margin-top: -5.5px;
        }
        #progress-bar::-moz-range-thumb {
            width: 15px;
            height: 15px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 50%;
            cursor: pointer;
        }

        #controls-bar {
            background-color: var(--controls-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center; 
            color: var(--controls-color);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 25px; 
        }

        .media-icon {
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }

        .media-icon:hover {
            color: #ddd;
        }

        .media-icon.active {
            color: #007aff;
        }
    </style>
</head>
<body>

    <div id="app-container">

        <div id="header">
            <div id="title">Cerulean Warbler</div>
        </div>

        <div id="playlist-container">
            <!-- Items added via JavaScript -->
        </div>

        <div id="timeline-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" value="0" step="1">
            <span id="total-time">0:12</span>
        </div>

        <div id="controls-bar">
            <div class="control-group">
                <div class="media-icon" id="prev-button">⏪</div>
                <div class="media-icon" id="play-pause-button">▶️</div>
                <div class="media-icon" id="next-button">⏩</div>
                <div class="media-icon" id="loop-button">🔄</div>
            </div>
        </div>

    </div>

    <script>
        // --- NATIVE-STYLE MOBILE APP LOGIC ---

        const tracks = [
            { filename: 'Cerulean Mixtape.mp3', title: 'Cerulean Mixtape', location: 'Various Locations', recordist: 'Everett Ackley', source: 'Sibly' },
            { filename: 'Sibly Cerulean Chitter Full.mp3', title: 'Chitter Full', location: 'Kentucky', recordist: 'Lang Elliott', source: 'Sibly' },
            { filename: 'Sibly Cerulean Song 1.mp3', title: 'Song 1', location: 'Kentucky', recordist: 'Lang Elliott', source: 'Sibly' },
            { filename: 'Sibly Cerulean Song 2.mp3', title: 'Song 2', location: 'Kentucky', recordist: 'Lang Elliott', source: 'Sibly' },
            { filename: 'Sibly Cerulean Song 3.mp3', title: 'Song 3', location: 'Kentucky', recordist: 'Lang Elliott', source: 'Sibly' },
            { filename: 'Sibly Cerulean Song 4.mp3', title: 'Song 4', location: 'New York', recordist: 'Bob McGuire', source: 'Sibly' },
            { filename: 'Sibly Cerulean Song 5.mp3', title: 'Song 5', location: 'Arkansas', recordist: 'Lang Elliott', source: 'Sibly' }
        ];

        let currentTrackIndex = 0;
        let currentAudio = null;
        let isPlaying = false;
        let isLooping = false;

        const playlistContainer = document.getElementById('playlist-container');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeText = document.getElementById('current-time');
        const totalTimeText = document.getElementById('total-time');
        const playPauseButton = document.getElementById('play-pause-button');
        const loopButton = document.getElementById('loop-button');

        function renderPlaylist() {
            playlistContainer.innerHTML = "";
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.classList.add('track-item');
                if (index === currentTrackIndex) item.classList.add('active');
                item.onclick = () => playTrack(index);

                const title = document.createElement('div');
                title.classList.add('track-title');
                title.innerText = track.title;

                const metadata = document.createElement('div');
                metadata.classList.add('track-metadata');
                metadata.innerText = `Location: ${track.location}. Recordist: ${track.recordist}. Source: ${track.source}`;

                item.appendChild(title);
                item.appendChild(metadata);
                playlistContainer.appendChild(item);
            });
        }

        function loadTrack(index) {
            currentTrackIndex = index;
            const currentTrack = tracks[currentTrackIndex];
            
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.removeAttribute('src');
                currentAudio.load();
                URL.revokeObjectURL(currentAudio.src);
            }

            fetch(currentTrack.filename)
                .then(response => response.blob())
                .then(blob => {
                    const objectUrl = URL.createObjectURL(blob);
                    currentAudio = new Audio(objectUrl);
                    setupAudioListeners();
                })
                .catch(error => {
                    console.error("Error loading offline audio:", error);
                    playNext();
                });

            renderPlaylist();
            totalTimeText.innerText = "0:12";
        }

        function playTrack(index) {
            loadTrack(index);
            setTimeout(() => {
                currentAudio.play();
                isPlaying = true;
                updateMediaIcons();
            }, 100);
        }

        function setupAudioListeners() {
            currentAudio.addEventListener('timeupdate', updateTimeline);
            currentAudio.addEventListener('ended', playNext);
        }

        function playNext() {
            let nextIndex = currentTrackIndex + 1;
            
            if (nextIndex >= tracks.length) {
                if (isLooping) {
                    nextIndex = 0;
                } else {
                    currentAudio.pause();
                    isPlaying = false;
                    updateMediaIcons();
                    return; 
                }
            }
            playTrack(nextIndex);
        }

        function playPrevious() {
            let prevIndex = currentTrackIndex - 1;
            
            if (prevIndex < 0) {
                prevIndex = tracks.length - 1;
            }
            playTrack(prevIndex);
        }

        function togglePlayPause() {
            if (!currentAudio) return;
            if (isPlaying) {
                currentAudio.pause();
                isPlaying = false;
            } else {
                currentAudio.play();
                isPlaying = true;
            }
            updateMediaIcons();
        }

        function toggleLoop() {
            isLooping = !isLooping;
            loopButton.classList.toggle('active', isLooping);
        }

        function updateMediaIcons() {
            playPauseButton.innerText = isPlaying ? "⏸️" : "▶️";
        }

        function updateTimeline() {
            const currentTime = currentAudio.currentTime;
            currentTimeText.innerText = formatTime(currentTime);

            if (!isNaN(currentAudio.duration)) {
                progressBar.max = currentAudio.duration;
                progressBar.value = currentTime;
            } else {
                totalTimeText.innerText = "0:12";
            }
        }

        function seekTo(event) {
            const seekTime = event.target.value;
            currentAudio.currentTime = seekTime;
        }

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = Math.floor(seconds % 60);
            const formattedMinutes = minutes.toString();
            const formattedSeconds = remainingSeconds.toString().padStart(2, '0');
            return `${formattedMinutes}:${formattedSeconds}`;
        }

        document.getElementById('prev-button').onclick = playPrevious;
        document.getElementById('play-pause-button').onclick = togglePlayPause;
        document.getElementById('next-button').onclick = playNext;
        document.getElementById('loop-button').onclick = toggleLoop;

        progressBar.oninput = seekTo;

        renderPlaylist();
        loadTrack(0);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Offline support enabled!'))
                    .catch(err => console.error('Offline support failed', err));
            });
        }
    </script>
</body>
</html>
